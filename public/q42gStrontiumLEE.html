<!DOCTYPE html>
<html>
<head>
<title>.✦ ݁˖ Movie List Maker .✦ ݁˖</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h2>Add or Update a Movie to Your List! ❤︎</h2>

<label>Movie Title:</label>
<input type="text" id="title">

<label>Release Year:</label>
<input type="number" id="year">

<label>Genre:</label>
<select id="genre">
<option>Romance</option>
<option>Comedy</option>
<option>Drama</option>
<option>Sci-fi</option>
<option>Horror</option>
</select>

<label>Your Rating:</label>

<div id="stars">
<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>
</div>

<br>

<button class="add" onclick="addMovie()">Add Movie!</button>

<h3>✰ Your Movie List ✰</h3>

<div id="movieList"></div>

</div>

<script>

let rating = 0;

function setRating(value){

rating = value;

let stars = document.querySelectorAll(".star");

stars.forEach((star,index)=>{
    if(index < value){
        star.classList.add("selected");
    }
    else{
        star.classList.remove("selected");
    }
});

}

function addMovie(){

let title = document.getElementById("title").value.trim();
let year = document.getElementById("year").value;
let genre = document.getElementById("genre").value;
if(title === "" || year === "" || rating === 0){
    alert("Please fill all of the required fields and choose your rating!");
    return;
}

let movies = JSON.parse(localStorage.getItem("movies")) || [];
let existingMovie = movies.find(m => m.title.toLowerCase() === title.toLowerCase());

if(existingMovie){
    existingMovie.rating = Math.round((existingMovie.rating + rating)/2);
    existingMovie.year = year;
    existingMovie.genre = genre;
} else {
    let movie = {
        title: title,
        year: year,
        genre: genre,
        rating: rating
    };
    movies.push(movie);
}

localStorage.setItem("movies", JSON.stringify(movies));

displayMovies(); 
document.getElementById("title").value="";
document.getElementById("year").value="";
rating=0;
setRating(0);
}
function deleteMovie(index){
    let confirmDelete = confirm("Are you sure you want to delete this movie?");

    if(confirmDelete){
        let movies = JSON.parse(localStorage.getItem("movies")) || [];
        movies.splice(index, 1);
        localStorage.setItem("movies",JSON.stringify(movies));
        displayMovies();
    }
}

function displayMovies(){

let movies = JSON.parse(localStorage.getItem("movies")) || [];

let list = document.getElementById("movieList");

list.innerHTML="";

movies.forEach((movie, index)=>{

let stars = "★".repeat(movie.rating);

list.innerHTML += `
<div class="movie">
${movie.title} (${movie.year}) - ${movie.genre}, Rating: ${stars}
<br><br>
<button class="dlt"; onclick="deleteMovie(${index})">Delete Movie</button>
</div>
`;
});

}

displayMovies();

</script>

</body>
</html>
